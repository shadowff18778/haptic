<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>L'Essence Fluide</title>
    
    <!-- Fallback CDN robuste -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --glass-highlight: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(0, 0, 0, 0.5);
            --neon-active: #a78bfa;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none; /* Bloque le menu contextuel iOS */
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            color: white;
            user-select: none;
            -webkit-user-select: none; /* Bloque la sélection de texte */
            touch-action: none;
            cursor: default;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: filter 0.5s ease;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom)); /* Support iPhone X+ */
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            opacity: 0.9;
            mix-blend-mode: difference;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 0.4rem;
            height: 0.4rem;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            animation: pulse 3s infinite;
        }

        .brand-text {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Version Tag */
        .version-tag {
            position: absolute;
            bottom: max(2.5rem, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
            pointer-events: none;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }

        /* Start Screen */
        #start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: opacity 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 20;
            pointer-events: auto;
        }

        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(1);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .icon-circle {
            width: 5rem;
            height: 5rem;
            margin-bottom: 1.5rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 200;
            margin: 0 0 0.5rem;
            letter-spacing: -0.03em;
            color: rgba(255,255,255,0.9);
        }

        .subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Footer & Controls */
        footer {
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            transition: opacity 0.8s ease;
            opacity: 0;
        }

        footer.visible { opacity: 1; }

        .controls {
            display: flex;
            gap: 1.25rem;
            pointer-events: auto;
        }

        /* Boutons "Liquid Glass 3D" */
        .control-btn {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: none;
            
            /* L'effet Verre Liquide 3D */
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            /* Ombres complexes pour le volume */
            box-shadow: 
                /* Ombre portée externe */
                0 10px 20px rgba(0,0,0,0.5),
                /* Lumière interne haut-gauche (Reflet) */
                inset 1px 1px 2px rgba(255,255,255,0.3),
                /* Ombre interne bas-droite (Profondeur) */
                inset -1px -1px 2px rgba(0,0,0,0.5),
                /* Glow interne subtil */
                inset 0 0 10px rgba(255,255,255,0.05);

            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            
            /* Animation Élastique (Spring) */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Petit reflet de lumière "Spotlight" sur le bouton */
        .control-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0.6;
            pointer-events: none;
        }

        .control-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 
                0 15px 25px rgba(0,0,0,0.6),
                inset 1px 1px 2px rgba(255,255,255,0.4),
                inset -1px -1px 2px rgba(0,0,0,0.5);
            color: white;
            background: rgba(40, 40, 40, 0.5);
        }

        .control-btn:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 
                0 5px 10px rgba(0,0,0,0.4),
                inset 2px 2px 5px rgba(0,0,0,0.6), /* Creux intérieur */
                inset -1px -1px 2px rgba(255,255,255,0.1);
            transition: all 0.1s ease-out; /* Plus rapide au clic */
        }

        /* État "Activé" pour le bouton Chaos */
        .control-btn.active {
            box-shadow: 
                0 0 20px rgba(139, 92, 246, 0.4),
                inset 0 0 10px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.5);
            color: #d8b4fe;
        }

        .control-btn.active svg {
            filter: drop-shadow(0 0 5px #a78bfa);
            animation: spin 4s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* Icons */
        .icon-svg {
            width: 1.4rem;
            height: 1.4rem;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            transition: stroke 0.3s ease;
        }

        /* Flash Overlay */
        #flash-overlay {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease-out;
            z-index: 40;
            mix-blend-mode: overlay;
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
        
        .loader-bar { width: 40px; height: 3px; background: #222; border-radius: 10px; overflow: hidden; }
        .loader-progress { width: 50%; height: 100%; background: #fff; animation: load 1s ease-in-out infinite; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }

    </style>
</head>
<!-- Bloque le clic droit sur le body -->
<body oncontextmenu="return false;">

    <div id="loading"><div class="loader-bar"><div class="loader-progress"></div></div></div>
    <div id="flash-overlay"></div>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <header>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span class="brand-text">HAPTIC</span>
            </div>
        </header>

        <div class="version-tag">V2.4.6.1</div>

        <div id="start-screen">
            <div class="start-btn" id="start-trigger">
                <div class="icon-circle">
                    <svg class="icon-svg" style="width: 2rem; height: 2rem;" viewBox="0 0 24 24">
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                    </svg>
                </div>
                <h1>Immersion</h1>
                <p class="subtitle">Toucher pour initier</p>
            </div>
        </div>

        <footer id="main-footer">
            <div class="controls">
                <!-- Bouton Fullscreen -->
                <button class="control-btn" id="btn-fullscreen">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                </button>
                <!-- Bouton Chaos/Etoile (Remis pour effet visuel) -->
                <button class="control-btn" id="btn-chaos">
                    <!-- Icone Etoile/Polygone -->
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        // --- AUDIO ENGINE (Chaos Ready) ---
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.oscillator = null;
                this.gainNode = null;
                this.chaosOsc = null; // Pour le son bizarre
                this.chaosGain = null;
                this.isInitialized = false;
            }

            init() {
                if (this.isInitialized) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                    
                    // Son de base (vent doux)
                    this.oscillator = this.ctx.createOscillator();
                    this.oscillator.type = 'sine';
                    this.oscillator.frequency.value = 50;
                    
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 100;
                    
                    this.gainNode = this.ctx.createGain();
                    this.gainNode.gain.value = 0;

                    this.oscillator.connect(filter);
                    filter.connect(this.gainNode);
                    this.gainNode.connect(this.ctx.destination);
                    this.oscillator.start();

                    // Son Chaos (Electrique/Aigu)
                    this.chaosOsc = this.ctx.createOscillator();
                    this.chaosOsc.type = 'triangle';
                    this.chaosOsc.frequency.value = 100;
                    this.chaosGain = this.ctx.createGain();
                    this.chaosGain.gain.value = 0;
                    
                    this.chaosOsc.connect(this.chaosGain);
                    this.chaosGain.connect(this.ctx.destination);
                    this.chaosOsc.start();

                    this.isInitialized = true;
                } catch (e) { console.error("Audio error", e); }
            }

            update(velocity, isChaos) {
                if (!this.isInitialized) return;
                const time = this.ctx.currentTime;
                
                // Base Sound
                const freq = 60 + (velocity * 200);
                const gain = Math.min(velocity * 0.2, 0.15);
                this.oscillator.frequency.setTargetAtTime(freq, time, 0.1);
                this.gainNode.gain.setTargetAtTime(gain, time, 0.1);

                // Chaos Sound
                if (isChaos) {
                    const chaosFreq = 100 + (velocity * 800) + (Math.random() * 100);
                    this.chaosOsc.frequency.setTargetAtTime(chaosFreq, time, 0.05);
                    this.chaosGain.gain.setTargetAtTime(Math.min(velocity * 0.15 + 0.05, 0.2), time, 0.1);
                } else {
                    this.chaosGain.gain.setTargetAtTime(0, time, 0.5);
                }
            }

            triggerClick() {
                if (!this.isInitialized) return;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.connect(g);
                g.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.3);
                g.gain.setValueAtTime(0.2, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            }
        }

        const audioEngine = new AudioEngine();

        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, sphere, particlesMesh;
        let geometry, material;
        let mouse = new THREE.Vector2();
        let target = new THREE.Vector3();
        let velocity = 0;
        let originalPositions;
        let clock = new THREE.Clock();
        
        // État
        let isChaosMode = false;

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5)); // High DPI
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);
            
            const p1 = new THREE.PointLight(0x4f46e5, 2, 20);
            p1.position.set(5, 5, 5);
            scene.add(p1);
            
            const p2 = new THREE.PointLight(0xff00aa, 2, 20);
            p2.position.set(-5, -5, 5);
            scene.add(p2);

            // Object
            const isMobile = window.innerWidth < 768;
            const radius = isMobile ? 1.15 : 1.5; 
            geometry = new THREE.IcosahedronGeometry(radius, isMobile ? 25 : 40);
            originalPositions = geometry.attributes.position.array.slice();

            material = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0.1,
                roughness: 0.05,
                transmission: 0.98,
                thickness: 1.5,
                ior: 1.5,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                side: THREE.DoubleSide
            });

            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // Particles
            const pGeo = new THREE.BufferGeometry();
            const pCount = isMobile ? 100 : 300;
            const posArray = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) posArray[i] = (Math.random()-0.5)*20;
            pGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesMesh = new THREE.Points(pGeo, new THREE.PointsMaterial({
                size: 0.02, color: 0xffffff, transparent: true, opacity: 0.3
            }));
            scene.add(particlesMesh);

            document.getElementById('loading').style.display = 'none';
            animate();
        }

        // Noise
        function noise(x, y, z, time) {
            // Noise plus complexe pour le mode chaos
            let n = Math.sin(x*2 + time) * Math.cos(y*1.5 + time) * Math.sin(z*3 + time);
            if(isChaosMode) {
                // Ajout de fréquences rapides en mode chaos
                n += Math.sin(x*10 + time*5) * 0.2;
            }
            return n * 0.3;
        }

        function updateSphere(time) {
            const positions = geometry.attributes.position.array;
            
            // Si Chaos Mode, on augmente l'intensité de base et la vitesse du temps
            const wobbleBase = isChaosMode ? 0.8 : 0.2; 
            const timeSpeed = isChaosMode ? 5.0 : 2.0;
            
            const wobbleIntensity = wobbleBase + (velocity * 0.5);

            for (let i = 0; i < positions.length; i += 3) {
                const x = originalPositions[i];
                const y = originalPositions[i+1];
                const z = originalPositions[i+2];
                const v = new THREE.Vector3(x, y, z).normalize();
                
                const currentLen = Math.sqrt(x*x + y*y + z*z);
                
                // Deformation
                const def = noise(v.x, v.y, v.z, time * timeSpeed);
                const newDist = currentLen + (def * wobbleIntensity * 0.5);
                
                positions[i] = v.x * newDist;
                positions[i+1] = v.y * newDist;
                positions[i+2] = v.z * newDist;
            }
            geometry.attributes.position.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Physics
            target.x = mouse.x * 3;
            target.y = mouse.y * 3;
            
            // Lerp plus rapide si Chaos
            sphere.position.lerp(target, isChaosMode ? 0.15 : 0.05);
            
            // Rotation frenetique si Chaos
            sphere.rotation.x += isChaosMode ? 0.02 : 0.002;
            sphere.rotation.y += isChaosMode ? 0.04 : 0.003;

            const oldPos = sphere.position.clone();
            const currentV = oldPos.distanceTo(sphere.position);
            velocity = THREE.MathUtils.lerp(velocity, currentV, 0.1);

            // Gestion Visuelle du Mode Chaos
            if(isChaosMode) {
                // Devient sombre/violet
                material.color.lerp(new THREE.Color(0x1a0525), 0.1);
                material.emissive = new THREE.Color(0x330044);
                material.emissiveIntensity = THREE.MathUtils.lerp(material.emissiveIntensity, 0.5, 0.1);
                material.roughness = 0.2;
            } else {
                // Retour au blanc pur
                material.color.lerp(new THREE.Color(0xffffff), 0.1);
                material.emissive = new THREE.Color(0x000000);
                material.emissiveIntensity = 0;
                material.roughness = 0.05;
            }

            audioEngine.update(velocity * 50, isChaosMode);
            particlesMesh.rotation.y = time * 0.05;

            updateSphere(time);
            renderer.render(scene, camera);
        }

        // --- INTERACTION ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if(e.touches.length) {
                mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function triggerFlash() {
             const overlay = document.getElementById('flash-overlay');
             overlay.style.opacity = '0.5';
             setTimeout(() => overlay.style.opacity = '0', 100);
             if (navigator.vibrate) navigator.vibrate(40);
             audioEngine.triggerClick();
        }

        window.addEventListener('click', (e) => {
            if (!e.target.closest('button')) {
                triggerFlash();
                velocity += 0.5;
            }
        });

        // UI Logic
        const startScreen = document.getElementById('start-screen');
        const footer = document.getElementById('main-footer');
        
        document.getElementById('start-trigger').addEventListener('click', (e) => {
            e.stopPropagation();
            audioEngine.init();
            startScreen.classList.add('hidden');
            footer.classList.add('visible');
            triggerFlash();
        });

        // Bouton Chaos (Etoile)
        document.getElementById('btn-chaos').addEventListener('click', function(e) {
            e.stopPropagation();
            isChaosMode = !isChaosMode; // Toggle mode
            
            // Visuel Bouton
            this.classList.toggle('active');
            
            // Effet Flash + Vitesse
            triggerFlash();
            velocity += 1.0; // Gros impact
        });

        // Bouton Fullscreen
        document.getElementById('btn-fullscreen').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e=>{});
            } else {
                if(document.exitFullscreen) document.exitFullscreen();
            }
        });

        // Bloquer le drag des images/textes
        window.addEventListener('dragstart', (e) => e.preventDefault());

        init();
    </script>
</body>
</html>
